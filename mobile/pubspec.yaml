name: samaj_mobile
description: SAMAJ — Community Intelligence Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_storage: any
  cloud_functions: any

  # Navigation
  go_router: any

  # State Management
  flutter_riverpod: any
  riverpod_annotation: ^2.6.0

  # Local Storage (offline-first)
  hive: any
  hive_flutter: any

  # Networking
  dio: any
  connectivity_plus: any

  # Maps
  google_maps_flutter: any

  # UI
  google_fonts: any
  material_color_utilities: any
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  image_picker: ^1.0.4
  record: ^5.1.0
  permission_handler: ^11.3.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  google_maps_flutter_web: ^0.6.2
  web: ^1.1.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  riverpod_generator: any
  riverpod_lint: any
  custom_lint: any
  hive_generator: any

flutter:
  uses-material-design: true
  assets:
    - assets/images/
