name: SAMAJ CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  AR_REGISTRY: ${{ secrets.GCP_PROJECT_ID }}/samaj
  API_IMAGE: samaj-api
  WORKER_IMAGE: samaj-worker

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Go Vet
        run: go vet ./...

      - name: Go Test
        run: go test -race -coverprofile=coverage.out ./internal/...

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build-and-push:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push API Image
        run: |
          docker build --target api \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.API_IMAGE }}:latest .
          docker push --all-tags ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.API_IMAGE }}

      - name: Build and Push Worker Image
        run: |
          docker build --target worker \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.WORKER_IMAGE }}:latest .
          docker push --all-tags ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.WORKER_IMAGE }}

  deploy-api:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: samaj-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
          flags: '--allow-unauthenticated --min-instances=0 --max-instances=3 --memory=256Mi --cpu=1'
          env_vars: |
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}

  deploy-worker:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: samaj-worker
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.AR_REGISTRY }}/${{ env.WORKER_IMAGE }}:${{ github.sha }}
          flags: '--no-allow-unauthenticated --min-instances=0 --max-instances=2 --memory=512Mi --cpu=1'
          env_vars: |
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}
            GCP_LOCATION=${{ env.GCP_REGION }}
            PUBSUB_SUBSCRIPTION=report-ingestion-sub
